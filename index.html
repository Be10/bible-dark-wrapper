<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bible Viewer</title>

<style>

/* ===== Fondo general ===== */

html, body{
margin:0;
padding:0;
height:100%;
background:#191919;
overflow:hidden;
font-family:system-ui, sans-serif;
}

/* ===== Contenedor del iframe ===== */

.frame-wrap{
width:100%;
height:100vh;
overflow:hidden;
background:#191919;
}

/* ===== Iframe ===== */

iframe{
width:100%;
height:calc(100vh + 150px);
border:none;

/* ocultar header de YouVersion */
transform:translateY(-150px);

/* dark mode */
filter:invert(1) hue-rotate(180deg) contrast(0.9) brightness(0.85);
}

</style>

</head>

<body>

<div class="frame-wrap">
<iframe id="bibleFrame" loading="eager"></iframe>
</div>

<script>

/* obtiene referencia de la URL */

function getRefFromUrl(){

const params = new URLSearchParams(window.location.search);

return params.get("ref") || "GEN.1.RVR1960";

}

/* construye URL de bible.com */

function buildBibleUrl(ref){

return "https://www.bible.com/bible/149/" + encodeURIComponent(ref);

}

/* carga capítulo */

function loadBible(){

const ref = getRefFromUrl();

const url = buildBibleUrl(ref);

document.getElementById("bibleFrame").src = url;

}

loadBible();

</script>

</body>
</html>
