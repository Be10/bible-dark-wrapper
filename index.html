<!doctype html>
<html lang="es">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bible Viewer</title>

<style>

/* fondo general */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #191919;
  overflow: hidden;
  font-family: system-ui, sans-serif;
}

/* contenedor del iframe */
.frame-wrap {
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: #191919;
}

/* iframe con recorte del header */
iframe {
  width: 100%;
  height: calc(100vh + 160px);
  border: none;

  /* recorta barra superior de YouVersion */
  transform: translateY(-160px);

  /* dark mode */
  filter: invert(1) hue-rotate(180deg) contrast(0.92) brightness(0.9);
}

</style>

</head>

<body>

<div class="frame-wrap">
  <iframe id="bibleFrame"></iframe>
</div>

<script>

function getRefFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("ref") || "GEN.1.RVR1960";
}

function buildBibleUrl(ref) {
  return "https://www.bible.com/bible/149/" + encodeURIComponent(ref);
}

function loadBible() {
  const ref = getRefFromUrl();
  const url = buildBibleUrl(ref);

  document.getElementById("bibleFrame").src = url;
}

loadBible();

</script>

</body>
</html>
